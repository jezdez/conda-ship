name: Build custom conda runtime

on:
  workflow_call:
    inputs:
      conda-ship-version:
        description: "conda-ship release version to download when the action wrapper is pinned by commit SHA."
        required: false
        type: string
        default: ""
      runtime-name:
        description: "Base runtime identity and default artifact name. Overrides [tool.conda-ship].runtime-name when set."
        required: false
        type: string
        default: ""
      artifact-name:
        description: "Staged executable and artifact stem. Overrides [tool.conda-ship].artifact-name when set."
        required: false
        type: string
        default: ""
      delegate-executable:
        description: "Delegate executable inside the managed prefix. Overrides [tool.conda-ship].delegate-executable when set."
        required: false
        type: string
        default: ""
      root:
        description: "Project root containing conda.toml/conda.lock, pixi.toml/pixi.lock, or pyproject.toml/pixi.lock."
        required: false
        type: string
        default: "project"
      artifact-layout:
        description: "Artifact layout to build: online, external, or embedded. Overrides [tool.conda-ship].artifact-layout when set."
        required: false
        type: string
        default: ""
      docs-url:
        description: "Documentation URL embedded in the runtime help output. Overrides [tool.conda-ship].docs-url when set."
        required: false
        type: string
        default: ""
      install-scheme:
        description: "Install scheme stamped into the runtime. Overrides [tool.conda-ship].install-scheme when set."
        required: false
        type: string
        default: ""
      install-name:
        description: "Final directory name under the install scheme."
        required: false
        type: string
        default: ""
      installer:
        description: "Package manager or installer stamped into the runtime. Overrides [tool.conda-ship].installer when set."
        required: false
        type: string
        default: ""
      retention-days:
        description: "Number of days to retain build artifacts."
        required: false
        type: number
        default: 7

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Verify matrix target
        shell: bash
        env:
          RUNNER_ARCH_NAME: ${{ runner.arch }}
          RUNNER_OS_NAME: ${{ runner.os }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          case "${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" in
            Linux/X64) host="x86_64-unknown-linux-gnu" ;;
            Linux/ARM64) host="aarch64-unknown-linux-gnu" ;;
            macOS/X64) host="x86_64-apple-darwin" ;;
            macOS/ARM64) host="aarch64-apple-darwin" ;;
            Windows/X64) host="x86_64-pc-windows-msvc" ;;
            *)
              echo "Unsupported runner platform: ${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" >&2
              exit 1
              ;;
          esac

          if [ "$host" != "$TARGET" ]; then
            echo "Expected matrix target ${TARGET}, got ${host}" >&2
            exit 1
          fi

      - name: Resolve action wrapper ref
        id: resolve
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          action_ref="${WORKFLOW_REF##*@}"
          echo "action_ref=${action_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: project
          persist-credentials: false

      - name: Checkout action wrapper
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: jezdez/conda-ship
          ref: ${{ steps.resolve.outputs.action_ref }}
          path: .conda-ship-action
          fetch-depth: 0
          persist-credentials: false

      - name: Build runtime
        id: cs
        uses: ./.conda-ship-action
        with:
          conda-ship-version: ${{ inputs.conda-ship-version }}
          runtime-name: ${{ inputs.runtime-name }}
          artifact-name: ${{ inputs.artifact-name }}
          delegate-executable: ${{ inputs.delegate-executable }}
          root: ${{ inputs.root }}
          artifact-layout: ${{ inputs.artifact-layout }}
          docs-url: ${{ inputs.docs-url }}
          install-scheme: ${{ inputs.install-scheme }}
          install-name: ${{ inputs.install-name }}
          installer: ${{ inputs.installer }}

      - name: Upload runtime artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.cs.outputs.asset-name }}
          path: ${{ steps.cs.outputs.dist-path }}
          retention-days: ${{ inputs.retention-days }}
