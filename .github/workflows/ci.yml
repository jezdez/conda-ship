name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/canary.yml"
      - ".github/workflows/release.yml"
      - "prek.toml"
      - "action.yml"
      - "src/**"
      - "tests/**"
      - "python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pixi.toml"
      - "pixi.lock"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/canary.yml"
      - ".github/workflows/release.yml"
      - "prek.toml"
      - "action.yml"
      - "src/**"
      - "tests/**"
      - "python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pixi.toml"
      - "pixi.lock"
      - "pyproject.toml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test and smoke runtime (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      TARGET: ${{ matrix.target }}
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true

      - name: Verify runner target
        shell: bash
        run: |
          set -euo pipefail

          host="$(pixi run -- rustc -vV | sed -n 's/^host: //p')"
          if [ "$host" != "$TARGET" ]; then
            echo "Expected runner target ${TARGET}, got ${host}" >&2
            exit 1
          fi

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Build cs CLI
        run: pixi run -- cargo rustc --locked --release --bin cs -- -D warnings

      - name: Test
        run: pixi run --locked test

      - name: Build runtime template
        run: pixi run -- cargo rustc --locked --release --bin cs-template --features runtime-template -- -D warnings

      - name: Build smoke runtime
        shell: bash
        run: |
          cs="./target/release/cs"
          template="./target/release/cs-template"
          if [[ "$TARGET" == *"windows"* ]]; then
            cs="${cs}.exe"
            template="${template}.exe"
          fi
          "$cs" build \
            --artifact-layout online \
            --runtime-name demo \
            --delegate-executable conda \
            --target "$TARGET" \
            --target-label "$TARGET" \
            --template "$template"

      - name: Smoke test built runtime
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN="./dist/demo-${TARGET}.exe"
          else
            BIN="./dist/demo-${TARGET}"
          fi
          "$BIN" --path "$RUNNER_TEMP/demo-smoke" bootstrap
          "$BIN" --path "$RUNNER_TEMP/demo-smoke" status

      - name: Build embedded bundle
        shell: bash
        run: |
          cs="./target/release/cs"
          template="./target/release/cs-template"
          if [[ "$TARGET" == *"windows"* ]]; then
            cs="${cs}.exe"
            template="${template}.exe"
          fi
          "$cs" build \
            --artifact-layout embedded \
            --runtime-name demo \
            --artifact-name demoz \
            --delegate-executable conda \
            --target "$TARGET" \
            --target-label "$TARGET" \
            --template "$template"

      - name: Smoke test embedded bundle
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN="./dist/demoz-${TARGET}.exe"
          else
            BIN="./dist/demoz-${TARGET}"
          fi
          "$BIN" --path "$RUNNER_TEMP/demoz-smoke" bootstrap
          "$BIN" --path "$RUNNER_TEMP/demoz-smoke" status

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    environment: codecov
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Generate coverage
        run: pixi run coverage

      - name: Check Codecov token
        id: codecov-token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: |
          if [ -n "$CODECOV_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Codecov
        if: steps.codecov-token.outputs.has_token == 'true'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
          fail_ci_if_error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Check runtime lock derivation
        run: pixi run --locked check-lock

      - name: Lint
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
        with:
          prek-version: "0.4.4"
