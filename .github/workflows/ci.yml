name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/canary.yml"
      - ".github/workflows/release.yml"
      - "prek.toml"
      - "action.yml"
      - "src/**"
      - "tests/**"
      - "python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pixi.toml"
      - "pixi.lock"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/canary.yml"
      - ".github/workflows/release.yml"
      - "prek.toml"
      - "action.yml"
      - "src/**"
      - "tests/**"
      - "python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pixi.toml"
      - "pixi.lock"
      - "pyproject.toml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test and smoke runtime
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-gnu
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true

      - name: Verify runner target
        shell: bash
        run: |
          set -euo pipefail

          host="$(pixi run -- rustc -vV | sed -n 's/^host: //p')"
          if [ "$host" != "$TARGET" ]; then
            echo "Expected runner target ${TARGET}, got ${host}" >&2
            exit 1
          fi

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Build cs CLI
        run: pixi run -- cargo rustc --locked --release --bin cs -- -D warnings

      - name: Test
        run: pixi run --locked test

      - name: Build runtime template
        run: pixi run -- cargo rustc --locked --release --bin cs-template --features runtime-template -- -D warnings

      - name: Build smoke runtime
        shell: bash
        run: |
          ./target/release/cs build \
            --layout online \
            --runtime demo \
            --delegate conda \
            --target "$TARGET" \
            --target-label "$TARGET" \
            --template ./target/release/cs-template

      - name: Smoke test built runtime
        shell: bash
        run: |
          ./dist/demo-"$TARGET" --path "$RUNNER_TEMP/demo-smoke" bootstrap
          ./dist/demo-"$TARGET" --path "$RUNNER_TEMP/demo-smoke" status

      - name: Build embedded bundle
        run: |
          ./target/release/cs build \
            --layout embedded \
            --runtime demo \
            --delegate conda \
            --target "$TARGET" \
            --target-label "$TARGET" \
            --template ./target/release/cs-template

      - name: Smoke test embedded bundle
        shell: bash
        run: |
          ./dist/demoz-"$TARGET" --path "$RUNNER_TEMP/demoz-smoke" bootstrap
          ./dist/demoz-"$TARGET" --path "$RUNNER_TEMP/demoz-smoke" status

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    environment: codecov
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Generate coverage
        run: pixi run coverage

      - name: Check Codecov token
        id: codecov-token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: |
          if [ -n "$CODECOV_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Codecov
        if: steps.codecov-token.outputs.has_token == 'true'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
          fail_ci_if_error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Check runtime lock derivation
        run: pixi run --locked check-lock

      - name: Lint
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
        with:
          prek-version: "0.4.4"
