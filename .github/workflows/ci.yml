name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-large
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          cache: true

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: pixi run build

      - name: Test
        run: pixi run test

      - name: Smoke test
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN="target/release/cx.exe"
          else
            BIN="target/release/cx"
          fi
          "$BIN" bootstrap --prefix "$RUNNER_TEMP/cx-smoke"
          "$BIN" status --prefix "$RUNNER_TEMP/cx-smoke"

      - name: Build cxz (embedded payload)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          CX_EMBED_PAYLOAD: "1"
        run: pixi run build

      - name: Smoke test cxz
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          cp target/release/cx cxz
          ./cxz bootstrap --prefix "$RUNNER_TEMP/cxz-smoke"
          ./cxz status --prefix "$RUNNER_TEMP/cxz-smoke"

      - name: Stage binary
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN_NAME="cx.exe"
            ASSET_NAME="cx-${TARGET}.exe"
          else
            BIN_NAME="cx"
            ASSET_NAME="cx-${TARGET}"
          fi
          cp "target/release/${BIN_NAME}" "${ASSET_NAME}"
          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Upload canary binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}
          retention-days: 7

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          cache: true

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: coverage

      - name: Generate coverage
        run: pixi run coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: ${{ github.event_name != 'pull_request' }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          cache: true
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - name: Lint
        run: pixi run lint
