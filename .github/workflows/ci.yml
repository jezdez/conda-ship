name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/canary.yml"
      - ".github/workflows/build.yml"
      - ".github/workflows/release.yml"
      - "prek.toml"
      - "action.yml"
      - "src/**"
      - "tests/**"
      - "python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pixi.toml"
      - "pixi.lock"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/canary.yml"
      - ".github/workflows/build.yml"
      - ".github/workflows/release.yml"
      - "prek.toml"
      - "action.yml"
      - "src/**"
      - "tests/**"
      - "python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pixi.toml"
      - "pixi.lock"
      - "pyproject.toml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test and smoke runtime (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      TARGET: ${{ matrix.target }}
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          cache: true

      - name: Verify runner target
        shell: bash
        run: |
          set -euo pipefail

          host="$(pixi run -- rustc -vV | sed -n 's/^host: //p')"
          if [ "$host" != "$TARGET" ]; then
            echo "Expected runner target ${TARGET}, got ${host}" >&2
            exit 1
          fi

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Build cs CLI
        run: pixi run -- cargo rustc --locked --release --bin cs -- -D warnings

      - name: Check update packaging command
        shell: bash
        run: |
          cs="./target/release/cs"
          if [[ "$TARGET" == *"windows"* ]]; then
            cs="${cs}.exe"
          fi
          "$cs" package-update --help >/dev/null

      - name: Test
        run: pixi run --locked test

      - name: Build runtime template
        run: pixi run -- cargo rustc --locked --release --bin cs-template --features runtime-template -- -D warnings

      - name: Build smoke runtime
        shell: bash
        run: |
          cs="./target/release/cs"
          template="./target/release/cs-template"
          if [[ "$TARGET" == *"windows"* ]]; then
            cs="${cs}.exe"
            template="${template}.exe"
          fi
          "$cs" build \
            --artifact-layout online \
            --runtime-name demo \
            --delegate-executable conda \
            --target "$TARGET" \
            --target-label "$TARGET" \
            --template "$template"

      - name: Smoke test built runtime
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN="./dist/demo-${TARGET}.exe"
          else
            BIN="./dist/demo-${TARGET}"
          fi
          DEMO_PREFIX="$RUNNER_TEMP/demo-smoke" "$BIN" info --json
          DEMO_PREFIX="$RUNNER_TEMP/demo-smoke" "$BIN" list --json

      - name: Build embedded bundle
        shell: bash
        run: |
          cs="./target/release/cs"
          template="./target/release/cs-template"
          if [[ "$TARGET" == *"windows"* ]]; then
            cs="${cs}.exe"
            template="${template}.exe"
          fi
          "$cs" build \
            --artifact-layout embedded \
            --runtime-name demo \
            --artifact-name demoz \
            --delegate-executable conda \
            --target "$TARGET" \
            --target-label "$TARGET" \
            --template "$template"

      - name: Smoke test embedded bundle
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN="./dist/demoz-${TARGET}.exe"
          else
            BIN="./dist/demoz-${TARGET}"
          fi
          DEMO_PREFIX="$RUNNER_TEMP/demoz-smoke" "$BIN" info --json
          DEMO_PREFIX="$RUNNER_TEMP/demoz-smoke" "$BIN" list --json

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    environment: codecov
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          cache: true

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Generate coverage
        run: pixi run coverage

      - name: Check Codecov token
        id: codecov-token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: |
          if [ -n "$CODECOV_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Codecov
        if: steps.codecov-token.outputs.has_token == 'true'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
          fail_ci_if_error: true

  python:
    name: Python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - if: runner.os == 'Windows'
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          environments: test
          cache: true

      - name: Test Python package
        run: pixi run --locked -e test pytest

      - name: Check Python package
        run: |
          pixi run --locked -e test ruff-check
          pixi run --locked -e test ruff-format-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          cache: true

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Check runtime lock derivation
        run: pixi run --locked check-lock

      - name: Check changed lines
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [[ -n "$BASE_SHA" && ! "$BASE_SHA" =~ ^0+$ ]]; then
            git diff --check "$BASE_SHA" "$GITHUB_SHA"
          else
            git diff-tree --check --root "$GITHUB_SHA"
          fi

      - name: Lint
        uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2.0.5
        with:
          prek-version: "0.4.4"
