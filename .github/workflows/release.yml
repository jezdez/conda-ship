name: Release

on:
  push:
    tags:
      - "*.*.*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Validate release tag
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: ${RELEASE_TAG}" >&2
            echo "Use a version tag such as 0.1.0." >&2
            exit 1
          fi

          {
            echo "tag=${RELEASE_TAG}"
            echo "version=${RELEASE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.release.outputs.tag }}
          persist-credentials: false

      - name: Verify package versions
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          pyproject_version="$(
            python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])'
          )"
          cargo_version="$(
            python -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])'
          )"

          if [ "$pyproject_version" != "$RELEASE_VERSION" ]; then
            echo "pyproject.toml version ${pyproject_version} does not match release tag ${RELEASE_VERSION}" >&2
            exit 1
          fi
          if [ "$cargo_version" != "$RELEASE_VERSION" ]; then
            echo "Cargo.toml version ${cargo_version} does not match release tag ${RELEASE_VERSION}" >&2
            exit 1
          fi

  build-assets:
    name: Build release assets (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [validate-release]
    permissions:
      contents: read
      id-token: write # mint the OIDC token required for artifact attestations
      attestations: write # publish provenance attestations for release assets
      artifact-metadata: write # create artifact storage records for attestations
    env:
      TARGET: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate-release.outputs.tag }}
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: false

      - name: Verify runner target
        shell: bash
        run: |
          set -euo pipefail

          host="$(pixi run -- rustc -vV | sed -n 's/^host: //p')"
          if [ "$host" != "$TARGET" ]; then
            echo "Expected runner target ${TARGET}, got ${host}" >&2
            exit 1
          fi

      - name: Build cs CLI
        run: pixi run -- cargo build --locked --release --bin cs

      - name: Build runtime template
        run: pixi run -- cargo build --locked --release --bin cs-template --features runtime-template

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets
          ext=""
          if [[ "$TARGET" == *"windows"* ]]; then
            ext=".exe"
          fi
          cp "target/release/cs${ext}" "release-assets/cs-${TARGET}${ext}"
          cp "target/release/cs-template${ext}" "release-assets/cs-template-${TARGET}${ext}"

      - name: Attest release assets
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: release-assets/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ matrix.target }}
          path: release-assets/*
          retention-days: 7

  github-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: [validate-release, build-assets, build-pypi-wheels, build-pypi-sdist]

    permissions:
      contents: write # create the immutable GitHub release for this tag
      id-token: write # mint the OIDC token required for artifact attestations
      attestations: write # publish provenance attestations for release metadata
      artifact-metadata: write # create artifact storage records for attestations

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Write SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail

          cd release-assets
          sums="${RUNNER_TEMP}/SHA256SUMS"
          find . -type f ! -name SHA256SUMS -print | sort | while read -r path; do
            sha256sum "${path#./}"
          done > "$sums"
          mv "$sums" SHA256SUMS

      - name: Attest checksum manifest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: release-assets/SHA256SUMS

      - name: Publish assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(release-assets/*)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists." >&2
            echo "Release immutability is enabled; create a new tag instead of replacing assets." >&2
            exit 1
          fi
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" \
            --draft \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes "conda-ship ${RELEASE_TAG}"

          cleanup_draft() {
            gh release delete "$RELEASE_TAG" --yes >/dev/null 2>&1 || true
          }
          trap cleanup_draft ERR

          gh release upload "$RELEASE_TAG" "${files[@]}"
          gh release edit "$RELEASE_TAG" --draft=false

          trap - ERR

  build-pypi-wheels:
    name: Build PyPI wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [validate-release]

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: "2_17"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            manylinux: "2_17"
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate-release.outputs.tag }}
          persist-credentials: false

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --locked -o dist-pypi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pypi-wheel-${{ matrix.target }}
          path: dist-pypi/*.whl
          if-no-files-found: error
          retention-days: 7

  build-pypi-sdist:
    name: Build PyPI sdist
    runs-on: ubuntu-latest
    needs: [validate-release]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate-release.outputs.tag }}
          persist-credentials: false

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: -o dist-pypi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pypi-sdist
          path: dist-pypi/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  pypi:
    name: Publish PyPI package
    runs-on: ubuntu-latest
    needs: [build-pypi-wheels, build-pypi-sdist, github-release]

    permissions:
      contents: read
      id-token: write # mint the OIDC token required for PyPI trusted publishing

    environment:
      name: pypi
      url: https://pypi.org/project/conda-ship/

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist-pypi
          pattern: "pypi-*"
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist-pypi/
