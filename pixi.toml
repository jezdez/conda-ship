[workspace]
name = "conda-express"
description = "A lightweight, single-binary conda bootstrapper"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
license = "BSD-3-Clause"

[dependencies]
rust = ">=1.85"
cargo-llvm-cov = ">=0.6"

[tasks]
build = "cargo build --release"
build-debug = "cargo build"
test = "cargo test --release"
test-all = "cargo test --release --features online_tests,slow_tests"
coverage = "cargo llvm-cov --lcov --output-path lcov.info"
coverage-html = "cargo llvm-cov --html"
fmt-check = "cargo fmt --check"
clippy = "cargo clippy --all-targets -- -D warnings"
lint = { depends-on = ["fmt-check", "clippy"] }

[feature.web.dependencies]
python = ">=3.12"

[feature.web.tasks]
web-build = { cmd = "wasm-pack build --target web --release", cwd = "crates/cx-web" }
web-build-dev = { cmd = "wasm-pack build --target web --dev", cwd = "crates/cx-web" }
web-copy = { cmd = "cp pkg/cx_web.js www/cx_web.js && cp pkg/cx_web_bg.wasm www/cx_web_bg.wasm", cwd = "crates/cx-web", depends-on = ["web-build"] }
web-copy-dev = { cmd = "cp pkg/cx_web.js www/cx_web.js && cp pkg/cx_web_bg.wasm www/cx_web_bg.wasm", cwd = "crates/cx-web", depends-on = ["web-build-dev"] }
web-serve = { cmd = "python -m http.server 8080 --directory www", cwd = "crates/cx-web", depends-on = ["web-copy"] }
web-serve-dev = { cmd = "python -m http.server 8080 --directory www", cwd = "crates/cx-web", depends-on = ["web-copy-dev"] }
web-conda-test-prep = { cmd = "cp ../../recipes/conda-browser/lockfile-env/pixi.lock www/conda-browser.lock && mkdir -p www/packages && cp ../../output/noarch/conda-browser-*.conda ../../output/noarch/frozendict-*.conda www/packages/", cwd = "crates/cx-web", depends-on = ["web-copy-dev"] }
web-conda-test = { cmd = "echo 'Open http://localhost:8080/conda-test.html' && python -m http.server 8080 --directory www", cwd = "crates/cx-web", depends-on = ["web-conda-test-prep"] }
web-clean = { cmd = "cargo clean && rm -rf pkg www/cx_web.js www/cx_web_bg.wasm", cwd = "crates/cx-web" }

[feature.docs.dependencies]
sphinx = ">=7.0"
conda-sphinx-theme = ">=0.2"
myst-parser = ">=3.0"
sphinx-design = ">=0.6"
sphinx-copybutton = ">=0.5"
sphinx-reredirects = ">=0.1"
sphinx-sitemap = ">=2.5"

[feature.docs.tasks]
docs = { cmd = "sphinx-build -b dirhtml . _build/dirhtml", cwd = "docs" }
docs-serve = { cmd = "python -m http.server", cwd = "docs/_build/dirhtml" }
docs-clean = { cmd = "rm -rf _build", cwd = "docs" }

[feature.recipes.dependencies]
rattler-build = ">=0.35"

[feature.recipes.tasks]
build-conda-browser = { cmd = "rattler-build build --recipe recipes/conda-browser/recipe.yaml -c conda-forge" }
build-frozendict-noarch = { cmd = "rattler-build build --recipe recipes/frozendict-noarch/recipe.yaml -c conda-forge" }
build-conda-browser-lockfile = { cmd = "pixi install", cwd = "recipes/conda-browser/lockfile-env", depends-on = ["build-conda-browser", "build-frozendict-noarch"] }

[environments]
docs = ["docs"]
web = ["web"]
recipes = ["recipes"]

[tool.cx]
channels = ["conda-forge"]
packages = [
    "python >=3.12",
    "conda >=25.1",
    "conda-rattler-solver",
    "conda-spawn",
    "conda-pypi",
    "conda-self",
]
exclude = ["conda-libmamba-solver"]
