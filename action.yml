name: "Build conda runtime"
description: >
  Build a custom conda runtime from a committed project lockfile using
  released conda-ship artifacts. Runs on the current runner; use a matrix
  strategy for multi-platform builds.
branding:
  icon: package
  color: green

inputs:
  conda-ship-version:
    description: "conda-ship release version to download, such as 0.3.0. Set this when the action is pinned by commit SHA. When omitted, the action uses the exact action tag if available."
    required: false
    default: ""
  runtime-name:
    description: "Base runtime identity and default artifact name. Overrides [tool.conda-ship].runtime-name when set."
    required: false
    default: ""
  artifact-name:
    description: "Staged executable and artifact stem. Overrides [tool.conda-ship].artifact-name when set."
    required: false
    default: ""
  delegate-executable:
    description: "Delegate executable inside the managed prefix. Overrides [tool.conda-ship].delegate-executable when set."
    required: false
    default: ""
  runtime-version:
    description: "Version shown by the generated runtime. Overrides [tool.conda-ship].runtime-version when set. When omitted, the action resolves runtime-version = { from = \"project-metadata\" } only if the build config requests it."
    required: false
    default: ""
  python-version:
    description: "Python version used only when resolving runtime-version = { from = \"project-metadata\" }."
    required: false
    default: "3.12"
  root:
    description: "Project root containing conda.toml/conda.lock, pixi.toml/pixi.lock, or pyproject.toml with the matching lockfile."
    required: false
    default: "."
  artifact-layout:
    description: "Artifact layout to build: online, external, or embedded. Overrides [tool.conda-ship].artifact-layout when set."
    required: false
    default: ""
  docs-url:
    description: "Documentation URL embedded in runtime help output. Must start with https:// or http://. Overrides [tool.conda-ship].docs-url when set."
    required: false
    default: ""
  install-scheme:
    description: "Install scheme stamped into the runtime. Overrides [tool.conda-ship].install-scheme when set."
    required: false
    default: ""
  install-name:
    description: "Final directory name under the install scheme. Overrides [tool.conda-ship].install-name when set."
    required: false
    default: ""
  installer:
    description: "Package manager or installer stamped into the runtime. Overrides [tool.conda-ship].installer when set."
    required: false
    default: ""

outputs:
  cs-path:
    description: "Absolute path to the downloaded conda-ship builder for post-sign packaging steps."
    value: ${{ steps.download.outputs.cs_path }}
  dist-path:
    description: "Absolute path to the directory containing all generated runtime artifacts."
    value: ${{ steps.stage.outputs.dist_path }}
  binary-path:
    description: "Absolute path to the built runtime."
    value: ${{ steps.stage.outputs.binary_path }}
  asset-name:
    description: "Platform-qualified asset name."
    value: ${{ steps.stage.outputs.asset_name }}
  info-path:
    description: "Absolute path to the artifact info JSON."
    value: ${{ steps.stage.outputs.info_path }}
  lock-path:
    description: "Absolute path to the staged runtime lock."
    value: ${{ steps.stage.outputs.lock_path }}
  package-list-path:
    description: "Absolute path to the package list."
    value: ${{ steps.stage.outputs.package_list_path }}
  checksums-path:
    description: "Absolute path to the SHA256 checksum file."
    value: ${{ steps.stage.outputs.checksums_path }}
  bundle-path:
    description: "Absolute path to the external bundle, when artifact-layout is external."
    value: ${{ steps.stage.outputs.bundle_path }}

runs:
  using: composite
  steps:
    - name: Resolve release assets
      id: resolve
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPOSITORY: ${{ github.action_repository }}
        CONDA_SHIP_VERSION_INPUT: ${{ inputs.conda-ship-version }}
        RUNNER_ARCH_NAME: ${{ runner.arch }}
        RUNNER_OS_NAME: ${{ runner.os }}
      run: |
        set -euo pipefail

        case "${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" in
          Linux/X64)
            target="x86_64-unknown-linux-gnu"
            ext=""
            ;;
          Linux/ARM64)
            target="aarch64-unknown-linux-gnu"
            ext=""
            ;;
          macOS/X64)
            target="x86_64-apple-darwin"
            ext=""
            ;;
          macOS/ARM64)
            target="aarch64-apple-darwin"
            ext=""
            ;;
          Windows/X64)
            target="x86_64-pc-windows-msvc"
            ext=".exe"
            ;;
          Windows/ARM64)
            target="aarch64-pc-windows-msvc"
            ext=".exe"
            ;;
          *)
            echo "Unsupported runner platform: ${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" >&2
            exit 1
            ;;
        esac

        version="$CONDA_SHIP_VERSION_INPUT"
        if [ -z "$version" ] && [ -n "$ACTION_PATH" ]; then
          version="$(git -C "$ACTION_PATH" describe --tags --exact-match 2>/dev/null || true)"
        fi
        if [ -z "$version" ]; then
          version="$ACTION_REF"
        fi
        version="${version#refs/tags/}"
        if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
          echo "Could not infer a conda-ship release tag from ${version:-<empty>}." >&2
          echo "Use jezdez/conda-ship@X.Y.Z or pass conda-ship-version: X.Y.Z when pinning the action by commit SHA." >&2
          exit 1
        fi

        repository=""
        if { [ -z "$ACTION_REF" ] || [ -z "$ACTION_REPOSITORY" ]; } && [ -n "$ACTION_PATH" ]; then
          remote="$(git -C "$ACTION_PATH" config --get remote.origin.url 2>/dev/null || true)"
          case "$remote" in
            https://github.com/*)
              repository="${remote#https://github.com/}"
              repository="${repository%.git}"
              ;;
            git@github.com:*)
              repository="${remote#git@github.com:}"
              repository="${repository%.git}"
              ;;
          esac
        fi
        if [ -z "$repository" ]; then
          repository="$ACTION_REPOSITORY"
        fi
        if [ -z "$repository" ]; then
          repository="jezdez/conda-ship"
        fi
        if [[ ! "$repository" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
          echo "Invalid action repository: ${repository}" >&2
          exit 1
        fi

        tool_dir="${RUNNER_TEMP}/conda-ship-${version}-${target}"
        mkdir -p "$tool_dir"

        echo "target=${target}" >> "$GITHUB_OUTPUT"
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "tool_dir=${tool_dir}" >> "$GITHUB_OUTPUT"
        echo "repository=${repository}" >> "$GITHUB_OUTPUT"
        echo "cs_asset=cs-${target}${ext}" >> "$GITHUB_OUTPUT"
        echo "template_asset=cs-template-${target}${ext}" >> "$GITHUB_OUTPUT"

    - name: Download conda-ship
      id: download
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        CS_ASSET: ${{ steps.resolve.outputs.cs_asset }}
        CONDA_SHIP_REPOSITORY: ${{ steps.resolve.outputs.repository }}
        CONDA_SHIP_VERSION: ${{ steps.resolve.outputs.version }}
        TEMPLATE_ASSET: ${{ steps.resolve.outputs.template_asset }}
        TOOL_DIR: ${{ steps.resolve.outputs.tool_dir }}
      run: |
        set -euo pipefail

        if ! command -v gh >/dev/null 2>&1; then
          echo "GitHub CLI is required to verify release attestations." >&2
          exit 1
        fi
        gh release download "$CONDA_SHIP_VERSION" \
          --repo "$CONDA_SHIP_REPOSITORY" \
          --dir "$TOOL_DIR" \
          --pattern "$CS_ASSET" \
          --pattern "$TEMPLATE_ASSET" \
          --pattern SHA256SUMS

        signer_workflow="${CONDA_SHIP_REPOSITORY}/.github/workflows/release.yml"
        gh attestation verify "${TOOL_DIR}/${CS_ASSET}" \
          --repo "$CONDA_SHIP_REPOSITORY" \
          --signer-workflow "$signer_workflow" >/dev/null
        gh attestation verify "${TOOL_DIR}/${TEMPLATE_ASSET}" \
          --repo "$CONDA_SHIP_REPOSITORY" \
          --signer-workflow "$signer_workflow" >/dev/null
        gh attestation verify "${TOOL_DIR}/SHA256SUMS" \
          --repo "$CONDA_SHIP_REPOSITORY" \
          --signer-workflow "$signer_workflow" >/dev/null

        grep -F "  ${CS_ASSET}" "${TOOL_DIR}/SHA256SUMS" > "${TOOL_DIR}/SHA256SUMS.selected"
        grep -F "  ${TEMPLATE_ASSET}" "${TOOL_DIR}/SHA256SUMS" >> "${TOOL_DIR}/SHA256SUMS.selected"
        (
          cd "$TOOL_DIR"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum --check SHA256SUMS.selected
          else
            shasum -a 256 --check SHA256SUMS.selected
          fi
        )

        chmod +x "${TOOL_DIR}/${CS_ASSET}" "${TOOL_DIR}/${TEMPLATE_ASSET}" || true
        echo "cs_path=${TOOL_DIR}/${CS_ASSET}" >> "$GITHUB_OUTPUT"
        echo "template_path=${TOOL_DIR}/${TEMPLATE_ASSET}" >> "$GITHUB_OUTPUT"

    - name: Plan runtime build
      id: plan
      shell: bash
      env:
        CONDA_SHIP_DELEGATE_EXECUTABLE: ${{ inputs.delegate-executable }}
        CONDA_SHIP_DOCS_URL: ${{ inputs.docs-url }}
        CONDA_SHIP_INSTALLER: ${{ inputs.installer }}
        CONDA_SHIP_INSTALL_NAME: ${{ inputs.install-name }}
        CONDA_SHIP_INSTALL_SCHEME: ${{ inputs.install-scheme }}
        CONDA_SHIP_ARTIFACT_LAYOUT: ${{ inputs.artifact-layout }}
        CONDA_SHIP_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        CONDA_SHIP_RUNTIME_NAME: ${{ inputs.runtime-name }}
        CONDA_SHIP_RUNTIME_VERSION: ${{ inputs.runtime-version }}
        CS_PATH: ${{ steps.download.outputs.cs_path }}
        CONDA_SHIP_ROOT: ${{ inputs.root }}
        CONDA_SHIP_TARGET: ${{ steps.resolve.outputs.target }}
        TEMPLATE_PATH: ${{ steps.download.outputs.template_path }}
      run: |
        set -euo pipefail

        dist_dir="${RUNNER_TEMP}/conda-ship-${CONDA_SHIP_TARGET}-dist"
        rm -rf "$dist_dir"
        mkdir -p "$dist_dir"
        build_args_file="${RUNNER_TEMP}/conda-ship-build.args0"

        add_optional_arg() {
          if [ -n "$2" ]; then
            build_args+=("$1" "$2")
          fi
        }

        build_args=(
          build
          --target "$CONDA_SHIP_TARGET"
          --target-label "$CONDA_SHIP_TARGET"
          --template "$TEMPLATE_PATH"
          --root "$CONDA_SHIP_ROOT"
          --out-dir "$dist_dir"
        )
        add_optional_arg --runtime-name "$CONDA_SHIP_RUNTIME_NAME"
        add_optional_arg --artifact-name "$CONDA_SHIP_ARTIFACT_NAME"
        add_optional_arg --delegate-executable "$CONDA_SHIP_DELEGATE_EXECUTABLE"
        add_optional_arg --artifact-layout "$CONDA_SHIP_ARTIFACT_LAYOUT"
        add_optional_arg --docs-url "$CONDA_SHIP_DOCS_URL"
        add_optional_arg --install-scheme "$CONDA_SHIP_INSTALL_SCHEME"
        add_optional_arg --install-name "$CONDA_SHIP_INSTALL_NAME"
        add_optional_arg --installer "$CONDA_SHIP_INSTALLER"
        printf '%s\0' "${build_args[@]}" > "$build_args_file"
        add_optional_arg --runtime-version "$CONDA_SHIP_RUNTIME_VERSION"

        dry_run_stderr="${RUNNER_TEMP}/conda-ship-dry-run.stderr"
        needs_project_metadata=false
        dry_run_ready=false
        if ! CONDA_SHIP_ERROR_FORMAT=json "$CS_PATH" "${build_args[@]}" --dry-run 2>"$dry_run_stderr"; then
          if [ -z "$CONDA_SHIP_RUNTIME_VERSION" ] && grep -q '"kind":"project_metadata_runtime_version"' "$dry_run_stderr"; then
            needs_project_metadata=true
          else
            cat "$dry_run_stderr" >&2
            exit 1
          fi
        else
          if [ -s "$dry_run_stderr" ]; then
            cat "$dry_run_stderr" >&2
          fi
          dry_run_ready=true
        fi

        echo "needs_project_metadata=${needs_project_metadata}" >> "$GITHUB_OUTPUT"
        echo "dry_run_ready=${dry_run_ready}" >> "$GITHUB_OUTPUT"

    - name: Set up Python
      if: steps.plan.outputs.needs_project_metadata == 'true'
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Resolve project metadata version
      id: project_metadata
      if: steps.plan.outputs.needs_project_metadata == 'true'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        CONDA_SHIP_ROOT: ${{ inputs.root }}
      run: |
        set -euo pipefail

        python -m pip install --disable-pip-version-check \
          "build>=1.2" \
          "tomli; python_version < '3.11'"
        runtime_version="$(
          PYTHONPATH="${ACTION_PATH}/python" \
            python -m conda_ship.github_action "$CONDA_SHIP_ROOT" | tail -n 1
        )"
        if [ -z "$runtime_version" ]; then
          echo "Project metadata did not resolve to a runtime version." >&2
          exit 1
        fi
        echo "runtime_version=${runtime_version}" >> "$GITHUB_OUTPUT"

    - name: Build runtime
      shell: bash
      env:
        CONDA_SHIP_DRY_RUN_READY: ${{ steps.plan.outputs.dry_run_ready }}
        CONDA_SHIP_RUNTIME_VERSION: ${{ inputs.runtime-version || steps.project_metadata.outputs.runtime_version }}
        CS_PATH: ${{ steps.download.outputs.cs_path }}
        CONDA_SHIP_TARGET: ${{ steps.resolve.outputs.target }}
      run: |
        set -euo pipefail

        dist_dir="${RUNNER_TEMP}/conda-ship-${CONDA_SHIP_TARGET}-dist"
        mkdir -p "$dist_dir"
        build_args_file="${RUNNER_TEMP}/conda-ship-build.args0"

        build_args=()
        while IFS= read -r -d '' arg; do
          build_args+=("$arg")
        done < "$build_args_file"
        if [ -n "$CONDA_SHIP_RUNTIME_VERSION" ]; then
          build_args+=(--runtime-version "$CONDA_SHIP_RUNTIME_VERSION")
        fi

        if [ "$CONDA_SHIP_DRY_RUN_READY" != "true" ]; then
          "$CS_PATH" "${build_args[@]}" --dry-run
        fi
        "$CS_PATH" "${build_args[@]}"

    - name: Stage runtime outputs
      id: stage
      shell: bash
      env:
        CONDA_SHIP_TARGET: ${{ steps.resolve.outputs.target }}
      run: |
        set -euo pipefail

        artifact_dir="${RUNNER_TEMP}/conda-ship-${CONDA_SHIP_TARGET}-dist"
        info_count="$(find "$artifact_dir" -maxdepth 1 -type f -name "*.info.json" | wc -l | tr -d ' ')"
        if [ "$info_count" -ne 1 ]; then
          echo "Expected exactly one conda-ship info file in ${artifact_dir}, found ${info_count}." >&2
          exit 1
        fi
        info_path="$(find "$artifact_dir" -maxdepth 1 -type f -name "*.info.json" | sort | sed -n '1p')"
        stem_path="${info_path%.info.json}"
        if [ -f "${stem_path}.exe" ]; then
          binary_path="${stem_path}.exe"
        else
          binary_path="${stem_path}"
        fi
        lock_path="${stem_path}.runtime.lock"
        package_list_path="${stem_path}.packages.txt"
        checksums_path="${stem_path}.sha256"
        for required in "$binary_path" "$info_path" "$lock_path" "$package_list_path" "$checksums_path"; do
          if [ ! -f "$required" ]; then
            echo "Expected conda-ship output was not created: ${required}" >&2
            exit 1
          fi
        done
        echo "dist_path=${artifact_dir}" >> "$GITHUB_OUTPUT"
        echo "binary_path=${binary_path}" >> "$GITHUB_OUTPUT"
        echo "asset_name=$(basename "$binary_path")" >> "$GITHUB_OUTPUT"
        echo "info_path=${info_path}" >> "$GITHUB_OUTPUT"
        echo "lock_path=${lock_path}" >> "$GITHUB_OUTPUT"
        echo "package_list_path=${package_list_path}" >> "$GITHUB_OUTPUT"
        echo "checksums_path=${checksums_path}" >> "$GITHUB_OUTPUT"
        bundle_path="${stem_path}.bundle.tar.zst"
        if [ -f "$bundle_path" ]; then
          echo "bundle_path=${bundle_path}" >> "$GITHUB_OUTPUT"
        else
          echo "bundle_path=" >> "$GITHUB_OUTPUT"
        fi
